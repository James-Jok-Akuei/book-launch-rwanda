<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Africa World Books</title>
    <!-- GitHub Pages SPA fallback: redirect deep links back to the app, preserving the path. -->
    <script>
      sessionStorage.setItem("spa-redirect", location.pathname + location.search + location.hash);
      location.replace(location.origin + location.pathname.split("/").slice(0, 1).join("/") + "/");
    </script>
  </head>
  <body></body>
</html>
